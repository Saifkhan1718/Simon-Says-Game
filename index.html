<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start</h2>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn firstcolor" type ="button" id="firstcolor"></div>
            <div class="btn secondcolor" type ="button" id="secondcolor"></div>
        </div>
        <div class="line-two">
            <div class="btn thirdcolor" type ="button" id="thirdcolor"></div>
            <div class="btn fourthcolor" type ="button" id="fourthcolor"></div>
        </div>
    </div>
    <script src = app.js></script>
</body>
</html>
